spring:
  application:
    name: AutoOps X
  datasource:
    url: jdbc:h2:mem:autoops;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  policy:
    high-risk-threshold: 0.75
  features:
    reliabilityControlPlane:
      enabled: false
  version: 2.0.0
